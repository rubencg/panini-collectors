<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ball base -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>

  <!-- White panels highlight gradient -->
  <defs>
    <radialGradient id="ballGrad" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>

  <!-- Pentagon patches — classic football pattern, cyan accent on dark -->
  <!-- Center top pentagon -->
  <polygon points="32,8 39,13 36.5,21 27.5,21 25,13"
    fill="#22d3ee" stroke="#0e7490" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Upper-left patch -->
  <polygon points="14,20 21,16 25,24 20,30 12,27"
    fill="#1e293b" stroke="#334155" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Upper-right patch -->
  <polygon points="50,20 43,16 39,24 44,30 52,27"
    fill="#1e293b" stroke="#334155" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Center patch -->
  <polygon points="32,26 38,30 36,38 28,38 26,30"
    fill="#1e293b" stroke="#334155" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Lower-left patch -->
  <polygon points="12,38 20,35 24,43 19,50 10,46"
    fill="#22d3ee" stroke="#0e7490" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Lower-right patch -->
  <polygon points="52,38 44,35 40,43 45,50 54,46"
    fill="#22d3ee" stroke="#0e7490" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Bottom patch -->
  <polygon points="32,56 25,51 27,43 37,43 39,51"
    fill="#1e293b" stroke="#334155" stroke-width="1" stroke-linejoin="round" clip-path="url(#circle)"/>

  <!-- Gloss overlay -->
  <circle cx="32" cy="32" r="30" fill="url(#ballGrad)" clip-path="url(#circle)"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
</svg>
